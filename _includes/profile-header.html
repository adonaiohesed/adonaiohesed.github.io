<!-- ── Profile Hero ────────────────────────────────────────── -->
<section class="profile-hero">
  <div class="profile-hero-glow profile-hero-glow-1"></div>
  <div class="profile-hero-glow profile-hero-glow-2"></div>
  <div class="profile-hero-inner">
    <div class="profile-avatar-wrap">
      {% if site.avatar and site.avatar != '' %}
        <img src="{{ site.avatar | relative_url }}" alt="{{ site.social.name }}" class="profile-avatar-img">
      {% else %}
        <div class="profile-avatar-fallback">H</div>
      {% endif %}
      <span class="profile-status-dot" title="Open to opportunities"></span>
    </div>
    <div class="profile-info">
      <h1 class="profile-name">{{ site.social.name }}</h1>
      <p class="profile-title">Security Engineer &nbsp;·&nbsp; AI Builder &nbsp;·&nbsp; Tech Lead</p>
      <div class="profile-badges">
        <span class="profile-badge profile-badge--red">Offensive Security</span>
        <span class="profile-badge profile-badge--purple">GenAI / RAG</span>
        <span class="profile-badge profile-badge--blue">Full-Stack</span>
        <span class="profile-badge profile-badge--green">Tech Lead</span>
      </div>
      <div class="profile-links">
        <a href="/assets/files/Hyoeun_Choi_Resume.pdf" class="profile-btn profile-btn--primary" target="_blank">
          <span class="material-symbols-outlined">description</span> Resume
        </a>
        <a href="https://github.com/{{ site.github.username }}" class="profile-btn" target="_blank" rel="noopener">
          <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
          GitHub
        </a>
        <a href="https://linkedin.com/in/{{ site.linkedin.username }}" class="profile-btn" target="_blank" rel="noopener">
          <svg height="16" viewBox="0 0 24 24" width="16" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>
        <a href="mailto:{{ site.social.email }}" class="profile-btn">
          <span class="material-symbols-outlined">mail</span>
        </a>
      </div>
    </div>
  </div>
</section>

<!-- ── Profile Tab Navigation ─────────────────────────────── -->
<nav class="profile-tab-nav">
  <div class="profile-tab-nav-inner">
    <a href="{{ '/about/' | relative_url }}"
       class="profile-tab {% if include.active == 'about' %}profile-tab--active{% endif %}">
      <span class="material-symbols-outlined">person</span> About
    </a>
    <a href="{{ '/projects/' | relative_url }}"
       class="profile-tab {% if include.active == 'projects' %}profile-tab--active{% endif %}">
      <span class="material-symbols-outlined">code</span> Projects
    </a>
    <a href="{{ '/ctf/' | relative_url }}"
       class="profile-tab {% if include.active == 'ctf' %}profile-tab--active{% endif %}">
      <span class="material-symbols-outlined">sports_esports</span> CTF
    </a>
  </div>
</nav>
