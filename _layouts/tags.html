---
layout: default
---

<!-- ── Tags List Hero ──────────────────────────────────────────── -->
<section class="cat-hero">
  <div class="cat-hero-glow-wrap">
    <div class="cat-hero-glow"></div>
  </div>
  <div class="cat-hero-inner">
    <h1 class="cat-hero-title">Tags</h1>
    <p class="cat-hero-desc">Filter content by specific technology and keywords.</p>
  </div>
</section>

<div class="home-wrapper">
  <div class="tags-cloud">
    {% assign tags = site.tags | sort %}
    {% for tag in tags %}
      {% assign tag_name = tag | first %}
      {% assign posts = tag | last %}
      <a href="{{ '/tags/' | relative_url }}{{ tag_name | slugize }}/" class="tag-cloud-item">
        #{{ tag_name }} <span class="tag-cloud-count">{{ posts.size }}</span>
      </a>
    {% endfor %}
  </div>
</div>

<style>
.tags-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 40px;
  justify-content: center;
}
.tag-cloud-item {
  background: var(--surface-color);
  border: 1px solid var(--border-color);
  padding: 8px 16px;
  border-radius: 20px;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 14px;
  transition: all 0.2s ease;
}
.tag-cloud-item:hover {
  border-color: var(--accent-color);
  color: var(--accent-color);
  background: rgba(13, 59, 102, 0.05);
}
.tag-cloud-count {
  font-size: 11px;
  opacity: 0.6;
  margin-left: 4px;
}
</style>
